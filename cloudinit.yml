#cloud-config

package_update: true
package_upgrade: true

packages:

* ca-certificates
* wget
* curl
* gnupg
* fail2ban
* unattended-upgrades
* software-properties-common
* haveged

write_files:

* path: /etc/fail2ban/jail.local
  permissions: '0644'
  content: |
  [sshd]
  enabled = true
  port = 22
  maxretry = 3
  bantime = 1h
  findtime = 10m

runcmd:

# Fail2Ban

* systemctl enable --now fail2ban

# Unattended upgrades

* dpkg-reconfigure -f noninteractive unattended-upgrades

# Time config

* timedatectl set-timezone UTC
* systemctl enable --now systemd-timesyncd

# Install Tailscale

* curl -fsSL https://tailscale.com/install.sh | sh

# Connect Tailscale (REPLACE WITH REAL KEY)

* tailscale up --authkey=YOUR_AUTH_KEY --ssh

# Install Node.js (NodeSource LTS)

* curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
* apt install -y nodejs

# Git latest

* add-apt-repository -y ppa:git-core/ppa
* apt update
* apt install -y git

# Docker setup (safe format)

* install -m 0755 -d /etc/apt/keyrings
* curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
* chmod a+r /etc/apt/keyrings/docker.asc
* sh -c "echo deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable > /etc/apt/sources.list.d/docker.list"
* apt update
* apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

# Docker group

* usermod -aG docker ubuntu
